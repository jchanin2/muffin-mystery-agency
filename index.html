<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Adventures</title>
  <link rel="stylesheet" href="hub-style.css">
</head>
<body>
  <div class="hub">
    <h1 class="hub-title">Math Adventures</h1>
    <p class="hub-subtitle">Choose your quest, adventurer...</p>
    <div class="game-cards">
      <a href="muffin/" class="game-card muffin-card">
        <div class="card-icon">
          <svg width="80" height="80" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="75" cy="100" rx="45" ry="32" fill="#A0794C"/>
            <ellipse cx="75" cy="105" rx="30" ry="18" fill="#C4A265"/>
            <ellipse cx="75" cy="68" rx="30" ry="25" fill="#A0794C"/>
            <ellipse cx="75" cy="78" rx="18" ry="12" fill="#B8935A"/>
            <ellipse cx="75" cy="73" rx="8" ry="5" fill="#5C3D1E"/>
            <circle cx="63" cy="60" r="4" fill="#2C1810"/>
            <circle cx="87" cy="60" r="4" fill="#2C1810"/>
            <circle cx="64" cy="59" r="1.5" fill="white"/>
            <circle cx="88" cy="59" r="1.5" fill="white"/>
            <path d="M 68 82 Q 75 88 82 82" fill="none" stroke="#5C3D1E" stroke-width="1.5"/>
            <path d="M 45 52 Q 50 30 75 28 Q 100 30 105 52 L 100 48 Q 75 38 50 48 Z" fill="#7A5C30"/>
            <rect x="50" y="46" width="50" height="4" rx="2" fill="#3E2712"/>
          </svg>
        </div>
        <h2 class="card-title">Muffin's Mystery Agency</h2>
        <p class="card-desc">Help Detective Muffin the capybara solve mysteries using decimal division!</p>
        <span class="card-tag detective">Detective</span>
      </a>
      <a href="quest/" class="game-card quest-card">
        <div class="card-icon">
          <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Shield -->
            <path d="M 40 8 L 65 18 L 65 45 Q 65 65 40 75 Q 15 65 15 45 L 15 18 Z" fill="#4a3728" stroke="#e8a030" stroke-width="2"/>
            <path d="M 40 14 L 59 22 L 59 43 Q 59 60 40 69 Q 21 60 21 43 L 21 22 Z" fill="#5c4033"/>
            <!-- Dragon emblem -->
            <path d="M 40 25 L 48 35 L 55 30 L 50 40 L 55 50 L 45 45 L 40 55 L 35 45 L 25 50 L 30 40 L 25 30 L 32 35 Z" fill="#e8a030"/>
            <!-- Crossed swords behind -->
            <line x1="10" y1="65" x2="35" y2="15" stroke="#888" stroke-width="3" stroke-linecap="round"/>
            <line x1="70" y1="65" x2="45" y2="15" stroke="#888" stroke-width="3" stroke-linecap="round"/>
            <circle cx="10" cy="65" r="4" fill="#e8a030"/>
            <circle cx="70" cy="65" r="4" fill="#e8a030"/>
          </svg>
        </div>
        <h2 class="card-title">Realms of Mathematica</h2>
        <p class="card-desc">Create a hero and embark on a D&D-inspired quest powered by math!</p>
        <span class="card-tag rpg">RPG Adventure</span>
      </a>
    </div>
  </div>
</body>
</html>
